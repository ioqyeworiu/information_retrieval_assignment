<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Exercise Demo Viewer</title>
    <style>
        :root {
            color-scheme: dark;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            background:
                radial-gradient(circle at 20% 15%, rgba(132, 204, 22, 0.18), transparent 28%),
                radial-gradient(circle at 80% 20%, rgba(59, 130, 246, 0.16), transparent 30%),
                linear-gradient(140deg, #050607 0%, #0a1013 45%, #030405 100%);
            color: #e2e8f0;
            display: grid;
            grid-template-rows: auto 1fr;
        }

        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            padding: 16px 22px;
            border-bottom: 1px solid rgba(148, 163, 184, 0.22);
            background: rgba(3, 7, 18, 0.72);
            backdrop-filter: blur(10px);
        }

        h1 {
            margin: 0;
            font-size: 1rem;
            font-weight: 700;
            color: #d9f99d;
            letter-spacing: 0.04em;
        }

        .open-original {
            color: #e2e8f0;
            text-decoration: none;
            border: 1px solid rgba(148, 163, 184, 0.35);
            border-radius: 10px;
            padding: 8px 12px;
            font-size: 0.9rem;
        }

        .open-original:hover {
            border-color: rgba(132, 204, 22, 0.6);
        }

        main {
            padding: 20px;
            display: grid;
            place-items: center;
        }

        .viewer-frame {
            width: min(1100px, 88vw);
            height: min(680px, 78vh);
            border-radius: 18px;
            border: 1px solid rgba(148, 163, 184, 0.28);
            background: rgba(2, 6, 23, 0.78);
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.5);
            overflow: hidden;
            display: grid;
            place-items: center;
        }

        .viewer-media {
            display: block;
        }

        .viewer-video {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .viewer-image {
            width: auto;
            height: auto;
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        .viewer-gif {
            width: clamp(200px, 74vw, 500px);
            max-width: 100%;
            height: auto;
            max-height: 100%;
        }

        .empty-state {
            padding: 24px;
            text-align: center;
            color: #cbd5e1;
            line-height: 1.5;
        }

        @media (max-width: 768px) {
            .viewer-frame {
                width: 92vw;
                height: 70vh;
            }

            header {
                padding: 14px 16px;
            }
        }
    </style>
</head>

<body>
    <header>
        <h1 id="title">Video Demo</h1>
        <a id="openOriginal" class="open-original" target="_blank" rel="noreferrer">Open Original</a>
    </header>

    <main>
        <section id="viewer" class="viewer-frame">
            <p class="empty-state">No media source found.</p>
        </section>
    </main>

    <script>
        const params = new URLSearchParams(window.location.search)
        const src = params.get('src')
        const title = params.get('title')

        const titleNode = document.getElementById('title')
        const openOriginalNode = document.getElementById('openOriginal')
        const viewerNode = document.getElementById('viewer')

        if (title) {
            titleNode.textContent = title
        }

        if (src) {
            openOriginalNode.href = src

            const isVideo = /\.(mp4|webm|ogg)(\?.*)?$/i.test(src)
            const mediaNode = document.createElement(isVideo ? 'video' : 'img')

            const isGif = /\.gif(\?.*)?$/i.test(src)

            mediaNode.className = isVideo
                ? 'viewer-media viewer-video'
                : `viewer-media viewer-image${isGif ? ' viewer-gif' : ''}`
            mediaNode.src = src

            if (isVideo) {
                mediaNode.controls = true
                mediaNode.autoplay = true
                mediaNode.loop = true
                mediaNode.muted = true
                mediaNode.playsInline = true
            }

            viewerNode.innerHTML = ''
            viewerNode.appendChild(mediaNode)
        } else {
            openOriginalNode.style.display = 'none'
        }
    </script>
</body>

</html>
